<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VN100 Signal Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181e2e;
    --border: #1e2840;
    --border2: #252f48;
    --text: #e8ecf5;
    --muted: #6b7a9e;
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --red: #ff4d6a;
    --red-dim: rgba(255,77,106,0.12);
    --amber: #ffb340;
    --amber-dim: rgba(255,179,64,0.12);
    --blue: #4d9fff;
    --blue-dim: rgba(77,159,255,0.12);
    --purple: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Be Vietnam Pro', sans-serif; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; gap: 24px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 680px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .controls label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 100px; }
  .controls input, .controls select {
    background: var(--bg); border: 1px solid var(--border2); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; outline: none; width: 100%;
  }
  .controls input:focus, .controls select:focus { border-color: var(--blue); }

  .gen-btn {
    background: var(--blue); color: #000; border: none; border-radius: 8px;
    padding: 10px 20px; font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: 0.03em;
    transition: opacity 0.15s; align-self: flex-end;
  }
  .gen-btn:hover { opacity: 0.85; }

  .card {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .card-header {
    padding: 20px 24px 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .card-header::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--signal-color, var(--green));
    border-radius: 4px 0 0 4px;
  }

  .ticker-block {}
  .ticker { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .company { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .date { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  .signal-badge {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 50px; font-weight: 700; font-size: 13px; letter-spacing: 0.08em;
  }
  .badge-buy { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }
  .badge-sell { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,106,0.3); }
  .badge-hold { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(77,159,255,0.3); }
  .badge-warn { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,64,0.3); }

  .tier { font-size: 11px; color: var(--muted); text-align: right; }
  .tier span { color: var(--amber); font-weight: 700; }

  .card-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  .strategy-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .strat-chip {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--purple); font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 6px; letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .hold-chip {
    background: var(--amber-dim); border: 1px solid rgba(255,179,64,0.2);
    color: var(--amber); font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 6px; font-family: 'JetBrains Mono', monospace;
  }

  .price-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .price-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .price-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .price-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; margin-top: 4px; }
  .price-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .price-card.target .price-value { color: var(--green); }
  .price-card.stop .price-value { color: var(--red); }
  .price-card.entry .price-value { color: var(--amber); }
  .price-card.current .price-value { color: var(--text); }

  .rr-bar-wrap { grid-column: span 2; }
  .rr-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .rr-bar-bg { background: var(--red-dim); border-radius: 4px; height: 8px; overflow: hidden; position: relative; }
  .rr-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red) 0%, var(--green) 100%); border-radius: 4px; transition: width 0.5s ease; }
  .rr-score { text-align: center; font-size: 12px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .rr-score span { color: var(--green); font-weight: 700; }

  .divider { height: 1px; background: var(--border); }

  .indicators-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .ind-cell {
    background: var(--surface2); border-radius: 10px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .ind-name { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .ind-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; margin-top: 3px; }
  .ind-status { font-size: 10px; margin-top: 2px; font-weight: 600; }
  .bull { color: var(--green); }
  .bear { color: var(--red); }
  .neutral { color: var(--muted); }

  .confidence-row {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center;
  }
  .conf-item {}
  .conf-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .conf-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; margin-top: 4px; }
  .conf-val.high { color: var(--green); }
  .conf-val.med { color: var(--amber); }
  .conf-val.low { color: var(--red); }

  .signals-bar { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
  .sig-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border2); }
  .sig-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sig-dot.partial { background: var(--amber); }

  .cancel-box {
    background: var(--red-dim); border: 1px solid rgba(255,77,106,0.25);
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .cancel-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .cancel-text { font-size: 12px; color: #ffa0b0; line-height: 1.6; }
  .cancel-text strong { color: var(--red); font-size: 13px; display: block; margin-bottom: 2px; }

  .win-rate-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--green-dim); border: 1px solid rgba(0,229,160,0.2);
    border-radius: 10px; padding: 12px 16px;
  }
  .wr-label { font-size: 12px; color: var(--green); font-weight: 600; }
  .wr-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; color: var(--green); }
  .wr-period { font-size: 11px; color: rgba(0,229,160,0.6); margin-top: 1px; }

  .footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-brand { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .footer-disc { font-size: 10px; color: var(--muted); opacity: 0.6; max-width: 300px; text-align: right; }

  .copy-btn {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
    border-radius: 8px; padding: 8px 16px; font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; font-weight: 600;
    transition: all 0.15s; display: block; margin: 0 auto; width: max-content;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--blue); }
</style>
</head>
<body>

<div class="controls">
  <label>TICKER
    <input type="text" id="inp-ticker" value="HPG" maxlength="5" style="text-transform:uppercase">
  </label>
  <label>CÔNG TY
    <input type="text" id="inp-company" value="Tập đoàn Hòa Phát">
  </label>
  <label>LOẠI TÍN HIỆU
    <select id="inp-signal">
      <option value="BUY">MUA (BUY)</option>
      <option value="HOLD">GIỮ (HOLD)</option>
      <option value="SELL">BÁN (SELL)</option>
      <option value="WARN">CẢNH BÁO</option>
    </select>
  </label>
  <label>CHIẾN LƯỢC
    <select id="inp-strategy">
      <option value="RSI_OVERSOLD">RSI Quá Bán</option>
      <option value="VOLUME_EXPLOSION">Bùng Nổ Khối Lượng</option>
      <option value="PRICE_DOWN_15_MA20">Giá -15% vs MA20</option>
      <option value="PRICE_DOWN_15_20D">Giá -15% trong 20 phiên</option>
      <option value="SAR_MACD">SAR × MACD Histogram</option>
      <option value="UPTREND">Uptrend</option>
      <option value="BOLLINGER">Mở Band Bollinger</option>
      <option value="DMI_WAVE" selected>Lướt Sóng DMI</option>
      <option value="STOCH_RSI">Giá Tăng + Stochastic RSI</option>
    </select>
  </label>
  <label>GIÁ HIỆN TẠI (₫)
    <input type="number" id="inp-price" value="26400">
  </label>
  <label>RSI_14
    <input type="number" id="inp-rsi" value="27.3" step="0.1">
  </label>
  <label>ADX_14
    <input type="number" id="inp-adx" value="31.2" step="0.1">
  </label>
  <label>XÁC SUẤT TĂNG (%)
    <input type="number" id="inp-prob" value="71" min="0" max="100">
  </label>
  <label>SỐ TÍN HIỆU ĐỒNG THUẬN
    <input type="number" id="inp-nsig" value="3" min="1" max="9">
  </label>
  <label>TỶ LỆ KHỐI LƯỢNG
    <input type="number" id="inp-vol" value="2.8" step="0.1">
  </label>
  <label>DÒNG NGOẠI (%)
    <input type="number" id="inp-foreign" value="6.0" step="0.1">
  </label>
  <label>RỦI RO T+2.5
    <select id="inp-t25">
      <option value="THẤP">THẤP</option>
      <option value="TRUNG BÌNH">TRUNG BÌNH</option>
      <option value="CAO">CAO</option>
    </select>
  </label>
  <button class="gen-btn" onclick="generate()">Tạo Tín Hiệu ▶</button>
</div>

<div class="card" id="signal-card">
  <!-- generated -->
</div>

<button class="copy-btn" onclick="copyText()">📋 Sao chép nội dung</button>

<script>
const STRATEGIES = {
  RSI_OVERSOLD:        { label: 'RSI QUÁ BÁN', holdDays: 60, winRate: 74.3 },
  VOLUME_EXPLOSION:    { label: 'BÙNG NỔ KHỐI LƯỢNG', holdDays: 180, winRate: 61.4 },
  PRICE_DOWN_15_MA20:  { label: 'GIÁ −15% VS MA20', holdDays: 180, winRate: 100.0 },
  PRICE_DOWN_15_20D:   { label: 'GIÁ −15% TRONG 20 PHIÊN', holdDays: 5, winRate: 79.2 },
  SAR_MACD:            { label: 'SAR × MACD HISTOGRAM', holdDays: 20, winRate: 70.6 },
  UPTREND:             { label: 'UPTREND', holdDays: 180, winRate: 59.3 },
  BOLLINGER:           { label: 'MỞ BAND BOLLINGER', holdDays: 5, winRate: 58.2 },
  DMI_WAVE:            { label: 'LƯỚT SÓNG DMI', holdDays: 10, winRate: 70.0 },
  STOCH_RSI:           { label: 'GIÁ TĂNG + STOCH RSI', holdDays: 180, winRate: 53.2 },
};

function fmt(n) { return n.toLocaleString('vi-VN'); }
function addDays(d, n) {
  const r = new Date(d);
  let added = 0;
  while (added < n) { r.setDate(r.getDate()+1); if (r.getDay()!==0 && r.getDay()!==6) added++; }
  return r.toLocaleDateString('vi-VN');
}

function generate() {
  const ticker   = document.getElementById('inp-ticker').value.toUpperCase();
  const company  = document.getElementById('inp-company').value;
  const signalT  = document.getElementById('inp-signal').value;
  const stratKey = document.getElementById('inp-strategy').value;
  const price    = parseFloat(document.getElementById('inp-price').value);
  const rsi      = parseFloat(document.getElementById('inp-rsi').value);
  const adx      = parseFloat(document.getElementById('inp-adx').value);
  const prob     = parseFloat(document.getElementById('inp-prob').value);
  const nsig     = parseInt(document.getElementById('inp-nsig').value);
  const volRatio = parseFloat(document.getElementById('inp-vol').value);
  const foreign  = parseFloat(document.getElementById('inp-foreign').value);
  const t25risk  = document.getElementById('inp-t25').value;

  const strat = STRATEGIES[stratKey];
  const tier = nsig >= 3 ? 1 : nsig === 2 ? 2 : 3;
  const tierLabel = ['', 'TIER 1 — ĐỘ TIN CẬY CAO NHẤT', 'TIER 2 — ĐỘ TIN CẬY CAO', 'TIER 3 — CHỜ XÁC NHẬN'][tier];
  const tierColor = ['', 'var(--green)', 'var(--amber)', 'var(--blue)'][tier];

  // derived price levels
  const atrEst = price * 0.018;
  const entry_lo = Math.round((price * 0.982) / 100) * 100;
  const entry_hi = Math.round((price * 1.008) / 100) * 100;
  const targetMult = signalT === 'BUY' ? (1 + (prob/100) * 0.15) : 0.94;
  const target = Math.round((price * targetMult) / 100) * 100;
  const stop   = Math.round((price * 0.942) / 100) * 100;
  const reward = ((target - price) / price * 100).toFixed(1);
  const risk   = ((price - stop) / price * 100).toFixed(1);
  const rr     = (parseFloat(reward) / parseFloat(risk)).toFixed(2);
  const rrPct  = Math.min(Math.max((parseFloat(rr) - 0.5) / 2.5 * 100, 5), 95).toFixed(0);

  const today = new Date();
  const dateStr = today.toLocaleDateString('vi-VN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const exitDate = addDays(today, strat.holdDays);

  const signalColors = { BUY: 'var(--green)', SELL: 'var(--red)', HOLD: 'var(--blue)', WARN: 'var(--amber)' };
  const sigColor = signalColors[signalT];
  const badgeClass = { BUY: 'badge-buy', SELL: 'badge-sell', HOLD: 'badge-hold', WARN: 'badge-warn' }[signalT];
  const sigEmoji = { BUY: '▲ MUA', SELL: '▼ BÁN', HOLD: '◆ GIỮ', WARN: '⚠ CẢNH BÁO' }[signalT];

  const rsiStatus = rsi < 30 ? ['QUÁSOLD', 'bull'] : rsi > 70 ? ['OVERBOUGHT', 'bear'] : ['TRUNG LẬP', 'neutral'];
  const adxStatus = adx > 40 ? ['RẤT MẠNH', 'bull'] : adx > 25 ? ['MẠNH', 'bull'] : adx > 15 ? ['YẾU', 'neutral'] : ['NGANG', 'neutral'];
  const volStatus = volRatio > 2 ? ['CAO BẤT THƯỜNG', 'bull'] : volRatio > 1.3 ? ['TRÊN TB', 'bull'] : ['BÌNH THƯỜNG', 'neutral'];
  const foreignStatus = foreign > 2 ? ['MUA RÒNG', 'bull'] : foreign < -2 ? ['BÁN RÒNG', 'bear'] : ['TRUNG TÍNH', 'neutral'];
  const macdFake = ((prob - 50) * 0.04).toFixed(3);
  const macdStatus = parseFloat(macdFake) > 0 ? ['DƯƠNG', 'bull'] : ['ÂM', 'bear'];
  const probClass = prob >= 65 ? 'high' : prob >= 50 ? 'med' : 'low';
  const t25Class = t25risk === 'THẤP' ? 'high' : t25risk === 'TRUNG BÌNH' ? 'med' : 'low';

  // dots
  let dots = '';
  for (let i = 0; i < 9; i++) {
    const cls = i < nsig ? 'active' : (i < nsig + 2 ? 'partial' : '');
    dots += `<div class="sig-dot ${cls}"></div>`;
  }

  document.getElementById('signal-card').style.setProperty('--signal-color', sigColor);
  document.getElementById('signal-card').innerHTML = `
    <div class="card-header">
      <div class="ticker-block">
        <div class="ticker">${ticker}</div>
        <div class="company">${company}</div>
        <div class="date">${dateStr}</div>
      </div>
      <div class="signal-badge">
        <span class="badge ${badgeClass}">${sigEmoji}</span>
        <div class="tier">Phân loại: <span>${tierLabel}</span></div>
      </div>
    </div>

    <div class="card-body">
      <div class="strategy-row">
        <span class="strat-chip">${strat.label}</span>
        <span class="hold-chip">⏱ T+${strat.holdDays} | Đến ${exitDate}</span>
      </div>

      <div class="price-grid">
        <div class="price-card current">
          <div class="price-label">Giá hiện tại</div>
          <div class="price-value">${fmt(price)} ₫</div>
          <div class="price-sub">Giá đóng cửa hôm nay</div>
        </div>
        <div class="price-card entry">
          <div class="price-label">Vùng mua vào</div>
          <div class="price-value">${fmt(entry_lo)}–${fmt(entry_hi)}</div>
          <div class="price-sub">Entry zone (±1%)</div>
        </div>
        <div class="price-card target">
          <div class="price-label">Mục tiêu (Upper Bound)</div>
          <div class="price-value">${fmt(target)} ₫</div>
          <div class="price-sub">+${reward}% từ giá hiện tại</div>
        </div>
        <div class="price-card stop">
          <div class="price-label">Cắt lỗ (Stop-Loss)</div>
          <div class="price-value">${fmt(stop)} ₫</div>
          <div class="price-sub">−${risk}% từ giá hiện tại</div>
        </div>
        <div class="rr-bar-wrap">
          <div class="rr-label">
            <span>Rủi ro: −${risk}%</span>
            <span>Tỷ lệ Lợi/Rủi</span>
            <span>Lợi nhuận: +${reward}%</span>
          </div>
          <div class="rr-bar-bg"><div class="rr-bar-fill" style="width:${rrPct}%"></div></div>
          <div class="rr-score">R:R = <span>${rr} : 1</span></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="indicators-grid">
        <div class="ind-cell">
          <div class="ind-name">RSI 14</div>
          <div class="ind-val ${rsiStatus[1]}">${rsi}</div>
          <div class="ind-status ${rsiStatus[1]}">${rsiStatus[0]}</div>
        </div>
        <div class="ind-cell">
          <div class="ind-name">ADX 14</div>
          <div class="ind-val ${adxStatus[1]}">${adx}</div>
          <div class="ind-status ${adxStatus[1]}">${adxStatus[0]}</div>
        </div>
        <div class="ind-cell">
          <div class="ind-name">MACD Hist.</div>
          <div class="ind-val ${macdStatus[1]}">${macdFake}</div>
          <div class="ind-status ${macdStatus[1]}">${macdStatus[0]} ↑</div>
        </div>
        <div class="ind-cell">
          <div class="ind-name">KL / TB20</div>
          <div class="ind-val ${volStatus[1]}">${volRatio}×</div>
          <div class="ind-status ${volStatus[1]}">${volStatus[0]}</div>
        </div>
        <div class="ind-cell">
          <div class="ind-name">Dòng ngoại</div>
          <div class="ind-val ${foreignStatus[1]}">${foreign > 0 ? '+' : ''}${foreign}%</div>
          <div class="ind-status ${foreignStatus[1]}">${foreignStatus[0]}</div>
        </div>
        <div class="ind-cell">
          <div class="ind-name">Rủi ro T+2.5</div>
          <div class="ind-val ${t25Class}">${t25risk}</div>
          <div class="ind-status ${t25Class}">T+2.5 RISK</div>
        </div>
      </div>

      <div class="confidence-row">
        <div class="conf-item">
          <div class="conf-label">Xác suất tăng</div>
          <div class="conf-val ${probClass}">${prob}%</div>
        </div>
        <div class="conf-item">
          <div class="conf-label">Tín hiệu đồng thuận</div>
          <div class="conf-val ${tier === 1 ? 'high' : tier === 2 ? 'med' : 'low'}">${nsig}/9</div>
          <div class="signals-bar">${dots}</div>
        </div>
        <div class="conf-item">
          <div class="conf-label">Win rate lịch sử</div>
          <div class="conf-val high">${strat.winRate}%</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">ở T+${strat.holdDays}</div>
        </div>
      </div>

      <div class="cancel-box">
        <div class="cancel-icon">🛑</div>
        <div class="cancel-text">
          <strong>Điều kiện hủy tín hiệu — thoát ngay lập tức</strong>
          Giá đóng cửa dưới <strong>${fmt(stop)} ₫</strong> · Khối lượng sụt giảm đột ngột + ngoại bán ròng mạnh · Chỉ số ADX giảm dưới 20 (nếu dùng chiến lược DMI/SAR)
        </div>
      </div>

      <div class="win-rate-row">
        <div>
          <div class="wr-label">📊 Xác suất sinh lời lịch sử</div>
          <div class="wr-period">Chiến lược "${strat.label}" — nắm giữ T+${strat.holdDays} phiên</div>
        </div>
        <div class="wr-val">${strat.winRate}%</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">VN100 QUANT SIGNAL</div>
      <div class="footer-disc">Tín hiệu từ mô hình định lượng. Không phải lời khuyên đầu tư.</div>
    </div>
  `;
}

function copyText() {
  const el = document.getElementById('signal-card');
  const txt = el.innerText;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Đã sao chép!';
    setTimeout(() => btn.textContent = '📋 Sao chép nội dung', 2000);
  });
}

generate();
</script>
</body>
</html>
